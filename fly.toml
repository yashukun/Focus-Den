# Fly.io config — the simplest Level-1 deploy (one small VM + one volume).
#
#   fly launch --copy-config --no-deploy   # first time (creates the app)
#   fly volumes create focus_den_data --size 1
#   fly secrets set JWT_SECRET="$(openssl rand -hex 32)"
#   fly deploy
#
# Rename `app` below to something globally unique before launching.

app = "focus-den"
primary_region = "iad"

[build]
  # Uses the repo Dockerfile.

[env]
  PORT = "8787"
  HOST = "0.0.0.0"
  DB_PATH = "/data/focus-den.db"
  TRUST_PROXY = "true"

[[mounts]]
  source = "focus_den_data"
  destination = "/data"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # A personal app can sleep when idle; first request wakes it in ~1s.
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
